<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #dbeafe, #e0f2fe, #f0f9ff);
    min-height:100vh;
}

.form-box{
    max-width:400px;
    margin:80px auto;
    padding:45px;
    background: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(20px);
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.4);
    box-shadow:0 20px 40px rgba(0,0,0,0.08);
    z-index: 1;
}

h2{
    text-align:center;
    color:#1e3a8a;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px 15px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #e5e7eb;
    font-size:14px;
}

input:focus{
    border-color:#2563eb;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:15px;
    cursor:pointer;
}

button:hover{
    background:#1e40af;
}

.link-text{
    text-align:center;
    margin-top:12px;
    font-size:14px;
}

.link-text a{
    color:#2563eb;
    text-decoration:none;
    font-weight:600;
}

.link-text a:hover{
    text-decoration:underline;
}
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
background:white;
padding:25px;
border-radius:10px;
text-align:center;
width:280px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
z-index:10000;
}

.popup-box button{
margin-top:10px;
padding:8px 15px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="form-box">

<h2>Student Login</h2>

<form id="loginForm">

<input type="email" id="email" placeholder="Enter Email" required>

<input type="password" id="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

<div class="link-text">
<span>Forgot Password?</span>
<a href="#" onclick="openReset()">Click here</a>
</div>

<div class="link-text">
New User ? 
<a href="index.html">Sign Up</a>
</div>

</div>

<script>

//========== LOGIN CODE ================    

document.getElementById("loginForm").addEventListener("submit", async function(e){

e.preventDefault();

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try{

const response = await fetch("http://localhost:1000/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:email,
password:password
})
});

const data = await response.json();

if(data.success){

// success message
showPopup("Login Successful ✅");

// admin page open
setTimeout(function(){
window.location.href = "admin.html";
},1200);

}else{

showPopup(data.message);

}

}catch(error){

showPopup("Server connection error ❌");

}

});


function showPopup(message){
document.getElementById("popupText").innerText = message;
document.getElementById("popupMessage").style.display = "flex";
}

function closePopup(){
document.getElementById("popupMessage").style.display = "none";
}

//=======GMAIL VALIDATION=======

function openReset(){

const email = document.getElementById("email").value;

if(email === ""){
showPopup("Please enter your email first ❌");
return;
}

document.getElementById("resetPopup").style.display="flex";
}


function closeReset(){
document.getElementById("resetPopup").style.display="none";
}


//==========RESET PASSWORD=========

async function resetPassword(){

const email = document.getElementById("email").value;
const newPass = document.getElementById("newPass").value;
const confirmPass = document.getElementById("confirmPass").value;

// ===== EMPTY CHECK =====
if(newPass === "" || confirmPass === ""){
showPopup("Please fill both password fields ❌");
return;
}

// ===== LENGTH CHECK =====
if(newPass.length < 6){
showPopup("Password must be at least 6 characters ❌");
return;
}

// ===== MATCH CHECK =====
if(newPass !== confirmPass){
showPopup("Passwords do not match ❌");
return;
}

// ===== SERVER REQUEST =====
const response = await fetch("http://localhost:1000/reset-password",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:email,
newPassword:newPass
})
});

const data = await response.json();

showPopup(data.message);

// popup close
document.getElementById("resetPopup").style.display="none";

// fields clear
document.getElementById("newPass").value="";
document.getElementById("confirmPass").value="";
}

//==========UPDATE PASSWORD=========
function updatePassword(){

const newPassword = document.getElementById("newPassword").value;
const confirmPassword = document.getElementById("confirmPassword").value;

// ===== EMPTY CHECK =====
if(newPassword === "" || confirmPassword === ""){
alert("Please fill both password fields ❌");
return;
}

// ===== LENGTH CHECK =====
if(newPassword.length < 6){
alert("Password must be at least 6 characters ❌");
return;
}

// ===== MATCH CHECK =====
if(newPassword !== confirmPassword){
alert("Passwords do not match ❌");
return;
}

// ===== SUCCESS =====
alert("Password updated successfully ✅");

// popup close
document.getElementById("forgotPopup").style.display="none";

// fields clear
document.getElementById("newPassword").value="";
document.getElementById("confirmPassword").value="";

}

</script>

<!-- MESSAGE POPUP -->
<div id="popupMessage" class="popup">
<div class="popup-box">

<p id="popupText"></p>

<button onclick="closePopup()">OK</button>

</div>
</div>

<div id="resetPopup" class="popup">
<div class="popup-box">

<h3>Create New Password</h3>

<input type="password" id="newPass" placeholder="New Password">

<input type="password" id="confirmPass" placeholder="Confirm New Password">

<button onclick="resetPassword()">Update Password</button>
<button onclick="closeReset()">Cancel</button>

</div>
</div>

</body>
</html>
